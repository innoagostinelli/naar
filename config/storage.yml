test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

amazon:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
  region: <%= Rails.application.credentials.dig(:aws, :region) %>
  bucket: <%= Rails.application.credentials.dig(:aws, :bucket) %>

# Cloudflare R2 (API S3-compatible). Reemplaza a "amazon" en producción una
# vez migrados los objetos existentes (ver active_storage_blobs.service_name).
r2:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:r2, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:r2, :secret_access_key) %>
  region: auto
  bucket: <%= Rails.application.credentials.dig(:r2, :bucket) %>
  endpoint: <%= Rails.application.credentials.dig(:r2, :endpoint) %>
  force_path_style: true
  # aws-sdk-s3 agrega por defecto un checksum extra (CRC32) en cada upload;
  # R2 rechaza requests con más de un checksum ("You can only specify one
  # non-default checksum at a time"). Desactivarlo para compatibilidad.
  request_checksum_calculation: when_required
  response_checksum_validation: when_required

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

